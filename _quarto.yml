project:
  type: website
  output-dir: _site
  preview:
    watch-inputs: true
  resources:
    - README.md
  render:
    # Explicit pages to render
    - index.qmd # renders README
    - reports/atlas_overview.qmd
    - reports/atlas_soil_carbon.qmd
    - reports/atlas_ghg_emissions.qmd
    - reports/atlas_biomass.qmd
    - reports/atlas_model_drivers.qmd
    - reports/downscaling_results.qmd
    - reports/design_points_analysis.qmd
    - reports/variable_importance.qmd
    - docs/intro_to_downscaling.qmd
    - docs/workflow_documentation.md
    - docs/references.md
    - docs/mixed_system_prototype.qmd

website:
  title: "MAGiC Downscaling"
  search: true
  page-navigation: true
  sidebar:
    style: docked
    collapse-level: 2
    contents:
      - href: index.qmd
        text: Home
      - section: "Map Atlas"
        contents:
          - href: reports/atlas_overview.qmd
            text: Overview & Key Findings
          - href: reports/atlas_soil_carbon.qmd
            text: Soil Carbon
          - href: reports/atlas_ghg_emissions.qmd
            text: "GHG Emissions (N\u2082O & CH\u2084)"
          - href: reports/atlas_biomass.qmd
            text: Aboveground Biomass
          - href: reports/atlas_model_drivers.qmd
            text: Model Drivers
      - section: Reports
        contents:
          - href: reports/downscaling_results.qmd
            text: Downscaling Results
          - href: reports/design_points_analysis.qmd
            text: Design Points Analysis
          - href: reports/variable_importance.qmd
            text: Downscaling Model Evaluation
      - section: Docs
        contents:
          - href: docs/intro_to_downscaling.qmd
            text: Intro to Downscaling
          - href: docs/workflow_documentation.md
            text: Technical Documentation
          - href: docs/mixed_system_prototype.qmd
            text: Mixed System Prototype
          - href: docs/references.md
            text: References
    tools:
      - icon: exclamation-octagon
        text: "Status: Draft"
      - icon: github
        href: https://github.com/ccmmf/downscaling

lightbox: auto

format:
  html:
    theme: cosmo
    toc: true
    self-contained: false
    df-print: paged

# Freeze results so CI can publish without re-executing heavy code.
execute:
  echo: false
  freeze: auto

author: "David LeBauer"
date: today
